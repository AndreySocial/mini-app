<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Groq Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<style>
/* ══════════════ THEMES ══════════════ */
:root[data-theme="light"] {
  --bg:        #ffffff;
  --surface:   #ffffff;
  --surface2:  #f5f5f5;
  --surface3:  #ececec;
  --border:    #e8e8e8;
  --border2:   #d0d0d0;
  --text:      #0d0d0d;
  --text2:     #666;
  --text3:     #bbb;
  --user-bg:   #0d0d0d;
  --user-txt:  #ffffff;
  --ai-bg:     #f5f5f5;
  --code-bg:   #ebebeb;
  --scroll:    #ddd;
  --danger:    #d00;
  --groq:      #F55036;
  --chip-bg:   #f0f0f0;
  --chip-brd:  #e0e0e0;
  --shadow:    rgba(0,0,0,0.06);
}

:root[data-theme="dark"] {
  --bg:        #0f0f0f;
  --surface:   #161616;
  --surface2:  #1e1e1e;
  --surface3:  #272727;
  --border:    #2c2c2c;
  --border2:   #3a3a3a;
  --text:      #f0f0f0;
  --text2:     #888;
  --text3:     #444;
  --user-bg:   #f0f0f0;
  --user-txt:  #0f0f0f;
  --ai-bg:     #1e1e1e;
  --code-bg:   #141414;
  --scroll:    #2c2c2c;
  --danger:    #ff5555;
  --groq:      #F55036;
  --chip-bg:   #1e1e1e;
  --chip-brd:  #2c2c2c;
  --shadow:    rgba(0,0,0,0.3);
}

/* ══════════════ RESET ══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;-webkit-tap-highlight-color:transparent;}
body{
  height:100%;height:100dvh;
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;
  overflow:hidden;
}

/* ══════════════ SHELL ══════════════ */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;}

/* ══════════════ HEADER ══════════════ */
#header{
  flex-shrink:0;
  display:flex;align-items:center;gap:11px;
  padding:11px 14px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  z-index:20;
}

/* Groq SVG Logo */
.groq-logo{
  display:flex;align-items:center;gap:8px;flex:1;min-width:0;
}
.groq-icon{
  width:32px;height:32px;flex-shrink:0;
}
.groq-wordmark{
  font-family:'Inter',sans-serif;
  font-size:1.2rem;font-weight:800;
  color:var(--groq);
  letter-spacing:-0.5px;
  line-height:1;
}
.groq-tag{
  font-size:0.6rem;color:var(--text2);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.5px;
  display:block;margin-top:1px;
}
.live-dot{
  display:inline-block;
  width:5px;height:5px;border-radius:50%;
  background:var(--groq);margin-right:4px;
  animation:ldot 2s ease-in-out infinite;
}
@keyframes ldot{0%,100%{opacity:.3}50%{opacity:1}}

.h-actions{display:flex;gap:5px;flex-shrink:0;}

.hbtn{
  width:33px;height:33px;border-radius:9px;
  border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);
  font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
  flex-shrink:0;
}
.hbtn:hover{background:var(--surface3);color:var(--text);}
.hbtn:active{transform:scale(.92);}

/* ══════════════ ROLE DRAWER ══════════════ */
#role-drawer{
  flex-shrink:0;
  overflow:hidden;
  max-height:0;
  transition:max-height .3s ease;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
}
#role-drawer.open{max-height:200px;}

.role-inner{padding:12px 14px;}
.role-title{font-size:.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.role-grid{display:flex;flex-wrap:wrap;gap:6px;}
.role-chip{
  padding:6px 12px;border-radius:20px;
  border:1px solid var(--chip-brd);
  background:var(--chip-bg);
  font-size:.75rem;font-family:'Inter',sans-serif;
  color:var(--text);cursor:pointer;
  transition:background .15s,border-color .15s,color .15s;
  white-space:nowrap;
}
.role-chip:hover{border-color:var(--groq);color:var(--groq);}
.role-chip.active{background:var(--groq);border-color:var(--groq);color:#fff;}

/* ══════════════ MESSAGES ══════════════ */
#msgs-outer{
  flex:1;overflow:hidden;position:relative;
}
#msgs-outer::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:16px;
  background:linear-gradient(to top,var(--bg),transparent);
  pointer-events:none;z-index:2;
}

#msgs{
  height:100%;
  overflow-y:scroll;
  overflow-x:hidden;
  padding:16px 12px 10px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
#msgs::-webkit-scrollbar{width:4px;}
#msgs::-webkit-scrollbar-track{background:transparent;}
#msgs::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:2px;}

/* Empty */
#empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:14px;padding:30px 16px;text-align:center;
}
.e-logo{
  width:52px;height:52px;border-radius:14px;
  background:var(--groq);
  display:flex;align-items:center;justify-content:center;
}
.e-title{font-size:1.1rem;font-weight:800;letter-spacing:-.3px;}
.e-sub{font-size:.78rem;color:var(--text2);max-width:220px;line-height:1.55;}
.chips{display:flex;flex-direction:column;gap:6px;width:100%;max-width:300px;}
.chip{
  background:var(--chip-bg);border:1px solid var(--chip-brd);
  border-radius:10px;padding:9px 13px;
  font-size:.77rem;font-family:'Inter',sans-serif;
  color:var(--text);cursor:pointer;text-align:left;
  display:flex;align-items:center;gap:8px;
  transition:border-color .15s,background .15s;
}
.chip:hover{border-color:var(--groq);background:var(--surface2);}
.chip:active{transform:scale(.98);}
.chip-ic{font-size:.95rem;flex-shrink:0;}

/* ── Message ── */
.msg{
  display:flex;gap:8px;
  animation:min .2s ease-out both;
}
@keyframes min{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}

.av{
  width:28px;height:28px;border-radius:8px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:13px;align-self:flex-end;margin-bottom:17px;
}
.msg.ai .av{background:var(--groq);}
.msg.user .av{background:var(--surface3);border:1px solid var(--border);}

.msg-col{
  display:flex;flex-direction:column;gap:2px;max-width:86%;
}
.msg.user .msg-col{align-items:flex-end;}

.bubble{
  padding:10px 13px;border-radius:16px;
  font-size:.875rem;line-height:1.65;word-break:break-word;
  position:relative;
}
.msg.user .bubble{
  background:var(--user-bg);color:var(--user-txt);
  border-bottom-right-radius:4px;
  white-space:pre-wrap;
}
.msg.ai .bubble{
  background:var(--ai-bg);color:var(--text);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
  white-space:normal;
}

/* Markdown */
.msg.ai .bubble p{margin-bottom:8px;}
.msg.ai .bubble p:last-child{margin-bottom:0;}
.msg.ai .bubble h1,.msg.ai .bubble h2,.msg.ai .bubble h3{font-weight:800;margin:12px 0 5px;letter-spacing:-.2px;}
.msg.ai .bubble ul,.msg.ai .bubble ol{padding-left:18px;margin:6px 0;}
.msg.ai .bubble li{margin-bottom:3px;}
.msg.ai .bubble code{
  font-family:'JetBrains Mono',monospace;font-size:.78em;
  background:var(--code-bg);border:1px solid var(--border);
  padding:1px 5px;border-radius:4px;
}
.msg.ai .bubble pre{
  background:var(--code-bg);border:1px solid var(--border);
  border-radius:10px;padding:12px;margin:8px 0;overflow-x:auto;
  position:relative;
}
.msg.ai .bubble pre code{background:none;border:none;padding:0;font-size:.78em;}
.msg.ai .bubble strong{font-weight:700;}
.msg.ai .bubble a{color:var(--groq);text-decoration:none;}
.msg.ai .bubble blockquote{
  border-left:3px solid var(--groq);
  padding-left:12px;margin:8px 0;color:var(--text2);font-style:italic;
}
.msg.ai .bubble table{border-collapse:collapse;width:100%;margin:8px 0;font-size:.82em;}
.msg.ai .bubble th,.msg.ai .bubble td{border:1px solid var(--border);padding:5px 9px;}
.msg.ai .bubble th{background:var(--surface3);font-weight:700;}

/* Copy button */
.copy-btn{
  position:absolute;top:7px;right:7px;
  width:26px;height:26px;border-radius:7px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text2);font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s,background .15s;
}
.bubble:hover .copy-btn{opacity:1;}
.copy-btn:hover{background:var(--surface3);color:var(--text);}
.copy-btn.copied{color:var(--groq);border-color:var(--groq);}

.msg-meta{
  font-size:.6rem;color:var(--text3);
  font-family:'JetBrains Mono',monospace;padding:0 2px;
}

/* Typing */
.typing{
  display:flex;gap:5px;align-items:center;
  padding:11px 14px;
  background:var(--ai-bg);border:1px solid var(--border);
  border-radius:16px;border-bottom-left-radius:4px;
}
.td{
  width:6px;height:6px;border-radius:50%;background:var(--text3);
  animation:tb 1.1s ease-in-out infinite;
}
.td:nth-child(2){animation-delay:.18s;}
.td:nth-child(3){animation-delay:.36s;}
@keyframes tb{0%,100%{opacity:.2;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}

/* Error */
.err{
  padding:9px 13px;border-radius:12px;
  border:1px solid var(--danger);
  background:rgba(200,0,0,.06);color:var(--danger);
  font-size:.8rem;display:flex;gap:7px;
}

/* ══════════════ INPUT BAR ══════════════ */
#input-bar{
  flex-shrink:0;
  padding:8px 12px 12px;
  background:var(--surface);
  border-top:1px solid var(--border);
}
.input-row{display:flex;gap:7px;align-items:flex-end;}

#inp{
  flex:1;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:13px;padding:10px 13px;
  color:var(--text);font-family:'Inter',sans-serif;font-size:.875rem;
  line-height:1.55;resize:none;outline:none;
  min-height:42px;max-height:130px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  transition:border-color .15s;
}
#inp:focus{border-color:var(--border2);}
#inp::placeholder{color:var(--text3);}
#inp::-webkit-scrollbar{width:3px;}
#inp::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

#send-btn,#stop-btn{
  width:42px;height:42px;flex-shrink:0;border-radius:12px;
  border:none;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s,transform .1s;
}
#send-btn{background:var(--groq);color:#fff;}
#send-btn:disabled{opacity:.3;cursor:not-allowed;}
#send-btn:not(:disabled):active{transform:scale(.9);}

#stop-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--danger);display:none;
}
#stop-btn.visible{display:flex;}
#stop-btn:active{transform:scale(.9);}

.input-hint{
  margin-top:5px;font-size:.6rem;color:var(--text3);
  text-align:center;font-family:'JetBrains Mono',monospace;
}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="header">
  <div class="groq-logo">
    <!-- Groq Icon SVG -->
    <svg class="groq-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="9" fill="#F55036"/>
      <path d="M16 7C11.03 7 7 11.03 7 16C7 20.97 11.03 25 16 25C20.97 25 25 20.97 25 16C25 14.12 24.42 12.38 23.44 10.94L21.62 12.76C22.28 13.74 22.67 14.83 22.67 16C22.67 19.68 19.68 22.67 16 22.67C12.32 22.67 9.33 19.68 9.33 16C9.33 12.32 12.32 9.33 16 9.33C17.4 9.33 18.7 9.77 19.76 10.52L21.59 8.69C20.07 7.63 18.11 7 16 7Z" fill="white"/>
      <path d="M16 12.5C14.07 12.5 12.5 14.07 12.5 16C12.5 17.93 14.07 19.5 16 19.5C17.93 19.5 19.5 17.93 19.5 16H17.17C17.17 16.65 16.65 17.17 16 17.17C15.35 17.17 14.83 16.65 14.83 16C14.83 15.35 15.35 14.83 16 14.83C16.32 14.83 16.6 14.95 16.81 15.16L18.5 13.47C17.89 12.86 17.01 12.5 16 12.5Z" fill="white"/>
    </svg>
    <div>
      <div class="groq-wordmark">groq</div>
      <div class="groq-tag"><span class="live-dot"></span>llama-3.3-70b</div>
    </div>
  </div>

  <div class="h-actions">
    <button class="hbtn" id="role-btn" onclick="toggleRoles()" title="Роль ИИ">🎭</button>
    <button class="hbtn" id="export-btn" onclick="exportChat()" title="Экспорт чата">💾</button>
    <button class="hbtn" id="theme-btn" onclick="toggleTheme()" title="Тема">🌙</button>
    <button class="hbtn" onclick="clearChat()" title="Очистить">🗑️</button>
  </div>
</div>

<!-- ROLE DRAWER -->
<div id="role-drawer">
  <div class="role-inner">
    <div class="role-title">Роль ассистента</div>
    <div class="role-grid" id="role-grid"></div>
  </div>
</div>

<!-- MESSAGES -->
<div id="msgs-outer">
  <div id="msgs">
    <div id="empty">
      <div class="e-logo">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <path d="M16 4C9.37 4 4 9.37 4 16C4 22.63 9.37 28 16 28C22.63 28 28 22.63 28 16C28 13.5 27.22 11.18 25.88 9.26L23.5 11.64C24.44 13.01 25 14.45 25 16C25 20.97 20.97 25 16 25C11.03 25 7 20.97 7 16C7 11.03 11.03 7 16 7C17.86 7 19.59 7.56 21.02 8.5L23.41 6.11C21.41 4.79 19.02 4 16 4Z" fill="white"/>
          <circle cx="16" cy="16" r="4" fill="white"/>
        </svg>
      </div>
      <div class="e-title">Привет! Чем помочь?</div>
      <div class="e-sub">Задай любой вопрос — Groq ответит мгновенно</div>
      <div class="chips">
        <button class="chip" onclick="useChip(this)"><span class="chip-ic">✍️</span>Напиши рассказ про робота</button>
        <button class="chip" onclick="useChip(this)"><span class="chip-ic">💡</span>Объясни квантовую физику просто</button>
        <button class="chip" onclick="useChip(this)"><span class="chip-ic">🐍</span>Сортировка пузырьком на Python</button>
        <button class="chip" onclick="useChip(this)"><span class="chip-ic">🎯</span>Придумай идею для стартапа</button>
      </div>
    </div>
  </div>
</div>

<!-- INPUT -->
<div id="input-bar">
  <div class="input-row">
    <textarea id="inp" rows="1" placeholder="Напиши сообщение..."
      onkeydown="onKey(event)" oninput="onInput(this)"></textarea>
    <button id="stop-btn" onclick="stopGen()" title="Остановить">■</button>
    <button id="send-btn" onclick="doSend()" disabled>➤</button>
  </div>
  <div class="input-hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — перенос</div>
</div>

</div><!-- #app -->

<script>
// ══════════════════════════════════════
//  ⚠️  ВСТАВЬ СВОЙ GROQ API КЛЮЧ СЮДА
// ══════════════════════════════════════
const GROQ_API_KEY = "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";
// ══════════════════════════════════════

const MODEL    = "llama-3.3-70b-versatile";
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const H_KEY    = "gc_hist_v3";
const T_KEY    = "gc_theme";
const R_KEY    = "gc_role";

// Telegram
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// Marked
if (typeof marked !== 'undefined') marked.setOptions({ breaks:true, gfm:true });

// ══ ROLES ══════════════════════════════
const ROLES = [
  { id:'default',    label:'🤖 Ассистент',   sys:'Ты умный и дружелюбный ИИ-ассистент. Отвечай развёрнуто, используй markdown. Отвечай на языке пользователя.' },
  { id:'coder',      label:'💻 Программист',  sys:'Ты опытный программист. Пиши чистый, хорошо прокомментированный код. Объясняй решения. Используй блоки кода в markdown.' },
  { id:'translator', label:'🌍 Переводчик',   sys:'Ты профессиональный переводчик. Определяй язык текста и переводи его на русский (или на язык запроса). Сохраняй стиль.' },
  { id:'writer',     label:'✍️ Писатель',     sys:'Ты талантливый писатель и редактор. Помогай с текстами, историями, сценариями. Пиши живо и образно.' },
  { id:'coach',      label:'🧠 Коуч',         sys:'Ты мотивационный коуч и психолог. Слушай, поддерживай, помогай находить решения. Задавай уточняющие вопросы.' },
];

let activeRole = localStorage.getItem(R_KEY) || 'default';

function buildRoleGrid() {
  const grid = document.getElementById('role-grid');
  grid.innerHTML = '';
  ROLES.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'role-chip' + (r.id === activeRole ? ' active' : '');
    btn.textContent = r.label;
    btn.onclick = () => selectRole(r.id);
    grid.appendChild(btn);
  });
}

function selectRole(id) {
  activeRole = id;
  localStorage.setItem(R_KEY, id);
  buildRoleGrid();
  tg?.HapticFeedback?.selectionChanged();
  // Close drawer
  document.getElementById('role-drawer').classList.remove('open');
  // Clear history so new role takes effect
  if (history.length > 0) {
    if (confirm('Сменить роль? История чата будет очищена.')) {
      clearHistory();
    } else {
      activeRole = localStorage.getItem(R_KEY) || 'default';
      buildRoleGrid();
    }
  }
}

function getSystem() {
  return ROLES.find(r => r.id === activeRole)?.sys || ROLES[0].sys;
}

function toggleRoles() {
  document.getElementById('role-drawer').classList.toggle('open');
  tg?.HapticFeedback?.selectionChanged();
}

// ══ THEME ══════════════════════════════
let theme = localStorage.getItem(T_KEY) || 'light';
applyTheme(theme);

function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem(T_KEY, t);
  document.getElementById('theme-btn').textContent = t === 'light' ? '🌙' : '☀️';
  if (tg) {
    tg.setBackgroundColor(t === 'light' ? '#ffffff' : '#0f0f0f');
    tg.setHeaderColor   (t === 'light' ? '#ffffff' : '#161616');
  }
}

function toggleTheme() {
  applyTheme(theme === 'light' ? 'dark' : 'light');
  tg?.HapticFeedback?.selectionChanged();
}

// ══ HISTORY ════════════════════════════
let history = [];

function saveHistory() {
  try { localStorage.setItem(H_KEY, JSON.stringify(history)); } catch(_){}
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(H_KEY);
    if (!raw) return;
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr) || !arr.length) return;
    history = arr;
    hideEmpty();
    arr.forEach(m => renderBubble(m.role === 'user' ? 'user' : 'ai', m.content, false));
    scrollBot(false);
  } catch(_){ history=[]; }
}

function clearHistory() {
  history = [];
  saveHistory();
  const m = document.getElementById('msgs');
  m.innerHTML = '';
  m.appendChild(buildEmpty());
}

function clearChat() {
  clearHistory();
  tg?.HapticFeedback?.notificationOccurred('warning');
}

// ══ EXPORT ═════════════════════════════
function exportChat() {
  if (!history.length) { alert('Чат пустой — нечего экспортировать.'); return; }
  let txt = `Groq Chat Export\n${new Date().toLocaleString('ru-RU')}\n${'─'.repeat(40)}\n\n`;
  history.forEach(m => {
    const who = m.role === 'user' ? 'Вы' : 'Groq AI';
    txt += `[${who}]\n${m.content}\n\n`;
  });
  const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `groq-chat-${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  tg?.HapticFeedback?.notificationOccurred('success');
}

// ══ INPUT ══════════════════════════════
const inpEl   = document.getElementById('inp');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');

inpEl.addEventListener('input', () => {
  sendBtn.disabled = !inpEl.value.trim() || isLoading;
});

function onInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isLoading) doSend(); }
}

function useChip(btn) {
  const ic = btn.querySelector('.chip-ic');
  const txt = ic ? btn.textContent.replace(ic.textContent,'').trim() : btn.textContent.trim();
  inpEl.value = txt;
  onInput(inpEl);
  doSend();
}

// ══ STOP ═══════════════════════════════
let isLoading  = false;
let abortCtrl  = null;

function setLoading(v) {
  isLoading = v;
  sendBtn.disabled = v || !inpEl.value.trim();
  if (v) { stopBtn.classList.add('visible'); }
  else   { stopBtn.classList.remove('visible'); }
}

function stopGen() {
  if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
  tg?.HapticFeedback?.notificationOccurred('warning');
}

// ══ SEND ═══════════════════════════════
async function doSend() {
  const text = inpEl.value.trim();
  if (!text || isLoading) return;

  hideEmpty();
  inpEl.value = '';
  inpEl.style.height = 'auto';
  setLoading(true);
  tg?.HapticFeedback?.impactOccurred('light');

  history.push({ role:'user', content:text });
  renderBubble('user', text, true);

  const tid = 'ty-' + Date.now();
  appendTyping(tid);
  scrollBot(true);

  try {
    const answer = await streamGroq(tid);
    if (answer) {
      history.push({ role:'assistant', content:answer });
      saveHistory();
      tg?.HapticFeedback?.notificationOccurred('success');
    }
  } catch(err) {
    removeEl(tid);
    if (err.name !== 'AbortError') appendError(err.message || 'Ошибка соединения');
  } finally {
    setLoading(false);
    scrollBot(true);
  }
}

// ══ GROQ STREAMING ═════════════════════
async function streamGroq(typingId) {
  const msgs = [
    { role:'system', content: getSystem() },
    ...history
  ];

  abortCtrl = new AbortController();

  const res = await fetch(GROQ_URL, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${GROQ_API_KEY}`,
      'Content-Type':  'application/json'
    },
    signal: abortCtrl.signal,
    body: JSON.stringify({
      model: MODEL, messages: msgs,
      stream: true, max_tokens: 2048, temperature: 0.7
    })
  });

  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error(e?.error?.message || `HTTP ${res.status}`);
  }

  removeEl(typingId);
  const bid  = 'b-' + Date.now();
  const cid  = bid + '-c';
  appendAiBubble(bid, cid);

  const reader  = res.body.getReader();
  const decoder = new TextDecoder();
  let full = '', buf = '';
  let autoScroll = true;

  const msgsEl = document.getElementById('msgs');
  const onScroll = () => {
    autoScroll = (msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight) < 60;
  };
  msgsEl.addEventListener('scroll', onScroll, { passive:true });

  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream:true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
          const delta = JSON.parse(raw)?.choices?.[0]?.delta?.content || '';
          if (delta) {
            full += delta;
            const el = document.getElementById(cid);
            if (el) el.innerHTML = renderMd(full);
            if (autoScroll) scrollBot(false);
          }
        } catch(_){}
      }
    }
  } finally {
    msgsEl.removeEventListener('scroll', onScroll);
  }

  const tEl = document.getElementById(bid + '-t');
  if (tEl) tEl.textContent = getTime();

  if (!full) throw new Error('Пустой ответ');
  return full;
}

// ══ DOM HELPERS ════════════════════════
function hideEmpty() {
  const el = document.getElementById('empty');
  if (el) el.remove();
}

function getTime() {
  return new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
}

function renderMd(t) {
  return typeof marked !== 'undefined' ? marked.parse(t) : esc(t).replace(/\n/g,'<br>');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderBubble(role, text, animate) {
  const w = document.createElement('div');
  w.className = `msg ${role}`;
  if (!animate) w.style.animation = 'none';
  const av   = role === 'ai' ? '⚡' : '👤';
  const cont = role === 'ai' ? renderMd(text) : esc(text).replace(/\n/g,'<br>');
  const copyBtn = role === 'ai'
    ? `<button class="copy-btn" onclick="copyBubble(this)" title="Копировать">📋</button>`
    : '';
  w.innerHTML = `
    <div class="av">${av}</div>
    <div class="msg-col">
      <div class="bubble">${cont}${copyBtn}</div>
      <div class="msg-meta">${getTime()}</div>
    </div>`;
  document.getElementById('msgs').appendChild(w);
}

function appendTyping(id) {
  const w = document.createElement('div');
  w.className = 'msg ai'; w.id = id;
  w.innerHTML = `
    <div class="av">⚡</div>
    <div class="msg-col">
      <div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div>
    </div>`;
  document.getElementById('msgs').appendChild(w);
}

function appendAiBubble(id, cid) {
  const w = document.createElement('div');
  w.className = 'msg ai'; w.id = id;
  w.innerHTML = `
    <div class="av">⚡</div>
    <div class="msg-col">
      <div class="bubble" id="${cid}">
        <button class="copy-btn" onclick="copyBubble(this)" title="Копировать">📋</button>
      </div>
      <div class="msg-meta" id="${id}-t"></div>
    </div>`;
  document.getElementById('msgs').appendChild(w);
}

function appendError(msg) {
  const w = document.createElement('div');
  w.className = 'msg ai';
  w.innerHTML = `
    <div class="av">⚡</div>
    <div class="msg-col"><div class="err">⚠️ ${esc(msg)}</div></div>`;
  document.getElementById('msgs').appendChild(w);
}

// Copy button
function copyBubble(btn) {
  const bubble = btn.parentElement;
  // Get text content excluding the button itself
  const clone = bubble.cloneNode(true);
  clone.querySelectorAll('.copy-btn').forEach(b => b.remove());
  const text = clone.innerText || clone.textContent || '';
  navigator.clipboard.writeText(text.trim()).then(() => {
    btn.textContent = '✅';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    btn.textContent = '❌';
    setTimeout(() => { btn.textContent = '📋'; }, 1500);
  });
  tg?.HapticFeedback?.notificationOccurred('success');
}

function removeEl(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function scrollBot(smooth) {
  const el = document.getElementById('msgs');
  if (smooth) el.scrollTo({ top: el.scrollHeight, behavior:'smooth' });
  else        el.scrollTop = el.scrollHeight;
}

buildRoleGrid();
loadHistory();
